version: 2

project_name: mcpup

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: mcpup
    main: ./cmd/mcpup
    binary: mcpup
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -buildid=
    flags:
      - -trimpath
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - docs/*

checksum:
  name_template: checksums.txt

brews:
  - repository:
      owner: mohammedsamin
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/mohammedsamin/mcpup"
    description: "Manage MCP server configs across AI clients from one place"
    license: "MIT"
    install: |
      bin.install "mcpup"
    test: |
      system bin/"mcpup", "help"

release:
  draft: false
  prerelease: auto

changelog:
  use: git
  sort: asc
