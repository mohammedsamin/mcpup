version: 2

project_name: mcpup

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: mcpup
    main: ./cmd/mcpup
    binary: mcpup
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -buildid=
    flags:
      - -trimpath
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - docs/*

checksum:
  name_template: checksums.txt

release:
  draft: false
  prerelease: auto

changelog:
  use: git
  sort: asc
